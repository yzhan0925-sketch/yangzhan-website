<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Preview</title>
    <style>
      :root {
        --bg: #111917;
        --contact: #f5b32c;
        --contact-soft: rgba(245, 179, 44, 0.62);
        --cyan: #66e6ff;
        --text: #efffff;
        --muted: rgba(239, 255, 255, 0.72);
        --mono: "OCR A Extended", "Lucida Console", Consolas, "Courier New", monospace;
        --serif: Didot, "Bodoni 72", "Bodoni MT", "Times New Roman", serif;
        --sans: "Helvetica Neue", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: var(--mono);
        cursor: none;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      body::before {
        background:
          radial-gradient(circle at 20% 45%, rgba(126, 45, 34, 0.36), transparent 42%),
          radial-gradient(circle at 74% 50%, rgba(95, 30, 20, 0.26), transparent 38%),
          linear-gradient(90deg, rgba(0, 0, 0, 0.35), transparent 12% 88%, rgba(0, 0, 0, 0.35)),
          #111917;
      }

      body::after {
        opacity: 0.84;
        mix-blend-mode: screen;
        background:
          repeating-linear-gradient(90deg, rgba(255, 0, 0, 0.15) 0 1px, rgba(0, 255, 120, 0.08) 1px 2px, rgba(0, 90, 255, 0.13) 2px 3px, transparent 3px 5px),
          repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px 4px);
        animation: crtFlicker 4.8s steps(6) infinite;
      }

      .page {
        position: relative;
        z-index: 1;
        width: 100vw;
        height: 100vh;
        padding: 34px 22px 0;
        animation: screenBoot 720ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }

      .cursor-dot {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 30;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--contact);
        box-shadow: 0 0 10px rgba(245, 179, 44, 0.78);
        pointer-events: none;
        opacity: 0;
        transform: translate(-50%, -50%);
        transition:
          width 150ms ease,
          height 150ms ease;
      }

      .cursor-dot.is-hover {
        width: 12px;
        height: 12px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 240px 1fr;
        align-items: start;
        min-height: 74px;
        border-bottom: 1px solid rgba(245, 179, 44, 0.5);
      }

      .sound {
        display: flex;
        align-items: center;
        gap: 16px;
        width: max-content;
        color: var(--contact);
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        cursor: none;
        user-select: none;
        transition:
          color 160ms ease,
          text-shadow 160ms ease,
          transform 160ms ease;
      }

      .sound:hover,
      .sound.is-on {
        color: #ffd36e;
        text-shadow: 0 0 12px rgba(245, 179, 44, 0.9);
        transform: translateX(2px);
      }

      .sound::after {
        content: "";
        width: 8px;
        height: 8px;
        background: var(--contact);
      }

      .ticker {
        justify-self: end;
        overflow: hidden;
        width: min(930px, 64vw);
        color: var(--contact);
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.16em;
        white-space: nowrap;
      }

      .ticker span {
        display: inline-block;
        min-width: 200%;
        animation: marquee 22s linear infinite;
      }

      .stripe-row {
        position: relative;
        height: 88px;
        border-bottom: 2px solid var(--contact-soft);
      }

      .stripe {
        position: absolute;
        left: 0;
        bottom: -1px;
        width: 270px;
        height: 48px;
        background:
          linear-gradient(55deg, transparent 0 116px, #111917 117px 129px, transparent 130px 193px, #111917 194px 206px, transparent 207px),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.11) 0 1px, transparent 1px 8px),
          linear-gradient(90deg, #f7c33e 0%, #f5b32c 100%);
        clip-path: polygon(0 0, 84% 0, 100% 100%, 0 100%);
        animation: stripeLoad 920ms cubic-bezier(0.18, 0.88, 0.24, 1) both;
        transition:
          filter 160ms ease,
          transform 160ms ease;
      }

      .stripe:hover {
        filter: brightness(1.18) saturate(1.14);
        transform: translateX(4px);
      }

      .close-x {
        position: absolute;
        right: 12px;
        bottom: 18px;
        color: var(--contact);
        font-size: 40px;
        line-height: 1;
        cursor: none;
        user-select: none;
        transition:
          color 150ms ease,
          text-shadow 150ms ease,
          transform 150ms ease;
      }

      .close-x:hover {
        color: #ffdc7a;
        text-shadow: 0 0 12px rgba(245, 179, 44, 0.9);
        transform: scale(1.06);
      }

      .contact-main {
        position: relative;
        display: grid;
        grid-template-columns: minmax(560px, 0.38fr) minmax(760px, 0.62fr);
        gap: 58px;
        height: calc(100vh - 196px);
        padding-top: 20px;
      }

      .left-space {
        padding-left: 18px;
      }

      .code {
        color: var(--contact);
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.18em;
        animation: revealUp 780ms 120ms ease both;
      }

      .contact-card {
        align-self: start;
        display: grid;
        align-content: center;
        justify-items: start;
        width: 100%;
        height: 598px;
        margin-left: auto;
        padding: 60px 74px;
        border: 1px solid var(--contact-soft);
        border-left: 10px solid var(--contact);
        background: rgba(50, 18, 13, 0.2);
        animation: panelIn 820ms 260ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease,
          background 160ms ease;
      }

      .contact-card:hover {
        border-color: rgba(255, 126, 86, 0.78);
        box-shadow: 0 0 28px rgba(245, 179, 44, 0.16);
        background: rgba(68, 22, 14, 0.24);
      }

      h1 {
        margin: 0 0 42px;
        font-family: var(--serif);
        font-size: clamp(88px, 7vw, 142px);
        font-weight: 300;
        line-height: 0.92;
        letter-spacing: 0;
      }

      .mail-line {
        display: block;
        width: 92px;
        height: 2px;
        margin-bottom: 22px;
        background: var(--contact);
      }

      .mail {
        margin: 0;
        color: var(--text);
        font-family: var(--sans);
        font-size: clamp(28px, 2.2vw, 40px);
        font-weight: 400;
        line-height: 1.2;
        cursor: none;
        transition:
          color 150ms ease,
          text-shadow 150ms ease;
      }

      .mail:hover {
        color: #fff;
        text-shadow: 0 0 14px rgba(245, 179, 44, 0.5);
      }

      .vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at 50% 50%, transparent 0 56%, rgba(0, 0, 0, 0.52) 100%);
      }

      .scan-sweep {
        position: fixed;
        inset: -40vh 0 auto;
        z-index: 2;
        height: 38vh;
        pointer-events: none;
        opacity: 0.42;
        background: linear-gradient(
          180deg,
          transparent 0%,
          rgba(245, 179, 44, 0.04) 24%,
          rgba(245, 179, 44, 0.18) 52%,
          rgba(102, 230, 255, 0.06) 72%,
          transparent 100%
        );
        mix-blend-mode: screen;
        animation: sweepDown 3.9s linear infinite;
      }

      .cursor-pulse {
        position: fixed;
        z-index: 4;
        width: 34px;
        height: 34px;
        pointer-events: none;
        border: 1px solid rgba(255, 117, 78, 0.82);
        border-radius: 50%;
        transform: translate(-50%, -50%) scale(0.4);
        opacity: 0;
        animation: pulse 520ms ease-out forwards;
      }

      @keyframes marquee {
        to {
          transform: translateX(-50%);
        }
      }

      @keyframes screenBoot {
        0% {
          opacity: 0;
          filter: brightness(2.4) blur(5px);
          transform: scaleY(0.985);
        }
        38% {
          opacity: 1;
          filter: brightness(1.65) blur(1px);
        }
        100% {
          opacity: 1;
          filter: brightness(1) blur(0);
          transform: scaleY(1);
        }
      }

      @keyframes revealUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes panelIn {
        0% {
          opacity: 0;
          clip-path: inset(0 100% 0 0);
        }
        55% {
          opacity: 1;
        }
        100% {
          opacity: 1;
          clip-path: inset(0);
        }
      }

      @keyframes stripeLoad {
        from {
          opacity: 0;
          transform: scaleX(0.22);
          transform-origin: left bottom;
        }
        to {
          opacity: 1;
          transform: scaleX(1);
          transform-origin: left bottom;
        }
      }

      @keyframes sweepDown {
        from {
          transform: translateY(-20vh);
        }
        to {
          transform: translateY(150vh);
        }
      }

      @keyframes crtFlicker {
        0%,
        100% {
          opacity: 0.84;
        }
        50% {
          opacity: 0.78;
        }
        52% {
          opacity: 0.9;
        }
      }

      @keyframes pulse {
        0% {
          opacity: 0.8;
          transform: translate(-50%, -50%) scale(0.42);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(1.8);
        }
      }
    </style>
  </head>
  <body>
    <div class="cursor-dot" aria-hidden="true"></div>
    <main class="page">
      <header class="topbar">
        <div class="sound is-on" role="button" tabindex="0" aria-label="Toggle sound">Sound On</div>
        <div class="ticker">
          <span>HELLO！Welcome to my portfolio | HELLO！Welcome to my portfolio | HELLO！Welcome to my portfolio | HELLO！Welcome to my portfolio |</span>
        </div>
      </header>

      <div class="stripe-row">
        <div class="stripe"></div>
        <div class="close-x">X</div>
      </div>

      <section class="contact-main">
        <aside class="left-space">
          <div class="code">003//CO</div>
        </aside>

        <section class="contact-card">
          <h1>Let's work<br />together!</h1>
          <div>
            <span class="mail-line"></span>
            <p class="mail" role="button" tabindex="0">yzhan0925@gmail.com</p>
          </div>
        </section>
      </section>
    </main>
    <div class="vignette"></div>
    <div class="scan-sweep"></div>
    <script>
      (() => {
        const soundToggle = document.querySelector(".sound");
        const mail = document.querySelector(".mail");
        const targets = document.querySelectorAll(".sound, .stripe, .close-x, .contact-card, .mail");
        const cursorDot = document.querySelector(".cursor-dot");
        let enabled = true;
        let ctx;

        const ensureAudio = () => {
          if (!ctx) {
            const AudioCtor = window.AudioContext || window.webkitAudioContext;
            if (!AudioCtor) return null;
            ctx = new AudioCtor();
          }
          if (ctx.state === "suspended") {
            ctx.resume();
          }
          return ctx;
        };

        const tone = (frequency = 680, duration = 0.055, gainValue = 0.2, type = "square") => {
          if (!enabled) return;
          const audio = ensureAudio();
          if (!audio) return;
          const osc = audio.createOscillator();
          const gain = audio.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(frequency, audio.currentTime);
          osc.frequency.exponentialRampToValueAtTime(frequency * 0.72, audio.currentTime + duration);
          gain.gain.setValueAtTime(0.0001, audio.currentTime);
          gain.gain.exponentialRampToValueAtTime(gainValue, audio.currentTime + 0.008);
          gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + duration);
          osc.connect(gain);
          gain.connect(audio.destination);
          osc.start();
          osc.stop(audio.currentTime + duration);
        };

        const pulse = (event) => {
          const marker = document.createElement("span");
          marker.className = "cursor-pulse";
          marker.style.left = `${event.clientX}px`;
          marker.style.top = `${event.clientY}px`;
          document.body.appendChild(marker);
          marker.addEventListener("animationend", () => marker.remove(), { once: true });
        };

        document.addEventListener("pointerdown", () => ensureAudio(), { once: true });

        document.addEventListener("pointermove", (event) => {
          cursorDot.style.left = `${event.clientX}px`;
          cursorDot.style.top = `${event.clientY}px`;
          cursorDot.style.opacity = "1";
        });

        targets.forEach((target) => {
          target.addEventListener("pointerenter", () => {
            cursorDot.classList.add("is-hover");
            tone(900, 0.045, 0.16, "square");
          });
          target.addEventListener("pointerleave", () => {
            cursorDot.classList.remove("is-hover");
          });
          target.addEventListener("pointerdown", (event) => {
            pulse(event);
            tone(420, 0.09, 0.24, "sawtooth");
          });
        });

        soundToggle.addEventListener("click", () => {
          enabled = !enabled;
          soundToggle.classList.toggle("is-on", enabled);
          soundToggle.textContent = enabled ? "Sound On" : "Sound Off";
          if (enabled) tone(780, 0.08, 0.22, "square");
        });

        mail.addEventListener("click", () => {
          window.location.href = "mailto:yzhan0925@gmail.com";
        });

        mail.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            window.location.href = "mailto:yzhan0925@gmail.com";
          }
        });

        document.querySelector(".close-x").addEventListener("click", () => {
          sessionStorage.setItem("portfolioReturnDirectory", "1");
          window.location.replace("index.html#directory");
        });
      })();
    </script>
  </body>
</html>
